<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">CoherenceMind monogram</title>
  <desc id="desc">A white serif C on a deep teal circle with a warm gold point.</desc>
  <defs>
    <radialGradient id="disc" cx="35%" cy="28%" r="78%">
      <stop offset="0" stop-color="#123E42"/>
      <stop offset="0.62" stop-color="#082020"/>
      <stop offset="1" stop-color="#061419"/>
    </radialGradient>
    <radialGradient id="goldCore" cx="50%" cy="45%" r="56%">
      <stop offset="0" stop-color="#F0B453"/>
      <stop offset="0.65" stop-color="#D9942B"/>
      <stop offset="1" stop-color="#9C5C13"/>
    </radialGradient>
    <filter id="discShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#081820" flood-opacity="0.22"/>
    </filter>
    <filter id="goldGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.85 0 1 0 0 0.5 0 0 1 0 0.16 0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="192" fill="url(#disc)" filter="url(#discShadow)"/>
  <text
    x="165"
    y="342"
    fill="#F8F7F3"
    font-family="Cormorant Garamond, Libre Baskerville, Georgia, serif"
    font-size="254"
    font-weight="600"
    letter-spacing="-10"
  >C</text>
  <circle cx="332" cy="282" r="24" fill="url(#goldCore)" filter="url(#goldGlow)"/>
</svg>
